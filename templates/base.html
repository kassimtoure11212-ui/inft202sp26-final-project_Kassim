<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IMDb Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --navy: #0C2255;
      --blue: #005DAA;
      --orange: #F26822;
      --ink: #172033;
      --muted: #647084;
      --line: #d9e0ea;
      --bg: #f5f7fb;
      --card: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--navy);
      color: white;
      border-bottom: 4px solid var(--orange);
    }

    .nav-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 6px;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 16px;
      color: var(--navy);
      font-size: 22px;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(12, 34, 85, 0.06);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .stat-value {
      margin-top: 8px;
      color: var(--blue);
      font-size: 28px;
      font-weight: 800;
    }

    .charts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .chart-box {
      height: 320px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #edf3fb;
      color: var(--navy);
      font-weight: 800;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border-radius: 8px;
    }

    .search-row, .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0;
      flex-wrap: wrap;
    }

    input {
      width: min(100%, 360px);
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
    }

    button, .button {
      border: 0;
      background: var(--blue);
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .button.secondary {
      background: white;
      color: var(--blue);
      border: 1px solid var(--line);
    }

    .callout {
      border-left: 5px solid var(--orange);
      background: #fff8f3;
      padding: 12px 14px;
      border-radius: 6px;
      margin: 12px 0 18px;
    }

    @media (max-width: 760px) {
      .nav-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid, .charts {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="brand">IMDb SQLite Project</div>
      <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/browse">Browse</a>
        <a href="/insights">Insights</a>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
